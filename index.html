<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 목록</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      /* 1500px 기준 설계 → 1rem=15px, 모니터 크기에 따라 비례 확대/축소 */
      font-size: clamp(10px, 1vw, 20px);
    }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Segoe UI', sans-serif; background: #f0f2f5;
    }
    body { display: flex; align-items: stretch; justify-content: center; padding: 1.3rem; }

    .app {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%; max-width: 1500px;
      display: flex; flex-direction: column;
      overflow: hidden; padding: 1.6rem 1.87rem 0;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }

    /* ── Progress ── */
    .progress-bar { height: 5px; background: #eee; border-radius: 99px; margin-bottom: 18px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#6c63ff,#a29bfe); border-radius: 99px; transition: width .4s; }

    /* ── Toolbar ── */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
    .filters { display: flex; gap: 6px; }
    .filter-btn { background: none; border: 2px solid #e0e0e0; border-radius: 8px; padding: 6px 14px; font-size: .82rem; cursor: pointer; color: #666; transition: all .2s; }
    .filter-btn.active { background: #6c63ff; border-color: #6c63ff; color: #fff; font-weight: 600; }
    .right-tools { display: flex; align-items: center; gap: 12px; }
    .stats { font-size: .82rem; color: #aaa; }
    .clear-done { background: none; border: none; color: #ff6b6b; font-size: .82rem; cursor: pointer; text-decoration: underline; }
    .btn-undo {
      display: flex; align-items: center; gap: 4px;
      background: none; border: 1.5px solid #ccc; border-radius: 8px;
      padding: 5px 12px; font-size: .82rem; cursor: pointer; color: #666;
      transition: all .18s; white-space: nowrap;
    }
    .btn-undo:hover:not(:disabled) { border-color: #6c63ff; color: #6c63ff; background: #f4f3ff; }
    .btn-undo:disabled { opacity: .35; cursor: not-allowed; }
    .undo-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: #6c63ff; color: #fff; border-radius: 99px;
      font-size: .68rem; font-weight: 700; min-width: 16px; height: 16px; padding: 0 4px;
    }
    .btn-undo:disabled .undo-count { background: #ccc; }
    .btn-members {
      background: none; border: 1.5px solid #6c63ff; border-radius: 8px;
      padding: 5px 14px; font-size: .82rem; color: #6c63ff; cursor: pointer;
      font-weight: 600; transition: all .18s; white-space: nowrap;
    }
    .btn-members:hover { background: #f4f3ff; }

    /* ── Date bar ── */
    .table-date-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .table-date-text { font-size: .92rem; font-weight: 600; color: #6c63ff; background: #ede9ff; border-radius: 8px; padding: 5px 14px; }
    .export-btns { display: flex; gap: 6px; }
    .btn-export {
      background: #217346; color: #fff; border: none; border-radius: 7px;
      padding: 5px 13px; font-size: .8rem; font-weight: 600; cursor: pointer;
      transition: background .18s; white-space: nowrap;
    }
    .btn-export:hover { background: #185c37; }

    /* ── Table ── */
    .list-section { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .table-wrapper { flex: 1; overflow-y: auto; overflow-x: auto; min-height: 0; }
    table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    thead th {
      background: #6c63ff; color: #fff; font-weight: 600;
      padding: 10px 6px; text-align: center; font-size: .81rem;
      white-space: nowrap; user-select: none;
      position: sticky; top: 0; z-index: 2;
    }
    thead th:first-child { border-radius: 8px 0 0 0; }
    thead th:last-child  { border-radius: 0 8px 0 0; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .12s; }
    tbody tr:hover { background: #f8f7ff; }
    tbody tr.done-row { background: #f5fff5; }
    tbody tr.done-row td { color: #666; }
    tbody tr.done-row .cell-readonly,
    tbody tr.done-row .complete-changed,
    tbody tr.done-row .serial-plain { color: #666 !important; }
    tbody tr.extended-row { background: #fff; }
    tbody tr.done-row.extended-row { background: #f5fff5; }
    tbody tr.done-section-start td { border-top: 2px dashed #9ec89e; }
    tbody td { padding: 3px 3px; vertical-align: middle; }

    /* Column widths */
    .col-serial       { width: 9.3rem; text-align: center; }
    .col-category     { width: 7.5rem; }
    .col-task         { min-width: 13.3rem; word-break: break-word; }
    .col-dept         { width: 7.3rem; }
    .col-member       { width: 8.7rem; }
    .col-duedate      { width: 8rem; }
    .col-completedate { width: 9.7rem; }
    .col-status       { width: 7.2rem; text-align: center; }
    .col-del          { width: 2.4rem; text-align: center; }
    .col-ext          { width: 7rem; text-align: center; }

    /* ── Serial ── */
    .serial-plain {
      display: inline-flex; align-items: center; gap: 0;
      font-size: .76rem; font-weight: 600; letter-spacing: .02em;
    }
    .serial-indent { font-size: .7rem; color: #bbb; flex-shrink: 0; margin-right: 2px; line-height: 1; }
    .serial-yymmdd {
      width: 6ch; border: none; border-bottom: 1px dashed transparent;
      background: transparent; color: inherit; font: inherit; font-size: inherit;
      font-weight: inherit; outline: none; text-align: center; padding: 0; cursor: text;
      font-variant-numeric: tabular-nums;
    }
    .serial-yymmdd:hover { border-bottom-color: currentColor; }
    .serial-yymmdd:focus { border-bottom: 1.5px solid currentColor; }
    .serial-fixed { pointer-events: none; }

    /* ── Cell inputs ── */
    .cell-input {
      width: 100%; border: 1px solid transparent; border-radius: 5px;
      padding: 5px 7px; font-size: .85rem; font-family: inherit;
      background: transparent; color: #333; outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .cell-input:hover  { border-color: #d0ceff; background: #fff; }
    .cell-input:focus  { border-color: #6c63ff; background: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,.13); }
    .cell-select { cursor: pointer; appearance: auto; }
    input[type="date"].cell-input { cursor: pointer; color: #555; }

    /* 할일 textarea */
    .cell-textarea {
      width: 100%; border: 1px solid transparent; border-radius: 5px;
      padding: 5px 7px; font-size: .85rem; font-family: inherit;
      background: transparent; color: #333; outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
      resize: none; overflow: hidden; min-height: 32px;
      line-height: 1.45; display: block;
    }
    .cell-textarea:hover { border-color: #d0ceff; background: #fff; }
    .cell-textarea:focus { border-color: #6c63ff; background: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,.13); }

    /* 읽기 전용 셀 (완료된 항목) */
    .cell-readonly {
      display: block; padding: 5px 7px; font-size: .85rem;
      word-break: break-word; white-space: pre-wrap; line-height: 1.45; color: #555;
    }
    .cell-readonly.date-val { font-size: .83rem; text-align: center; color: #777; }

    .complete-changed { font-size: .78rem; color: #888; text-align: center; padding: 4px 2px; line-height: 1.4; }
    .date-readonly { font-size: .83rem; color: #999; padding: 5px 7px; display: block; text-align: center; }

    /* ── 진행현황 ── */
    .traffic-light { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 3px 0; }
    .tl-dot { display: inline-block; width: 1rem; height: 1rem; border-radius: 50%; }
    .tl-dot.gray   { background: #b0b0b0; }
    .tl-dot.red    { background: #E8000D; box-shadow: 0 0 5px rgba(232,0,13,.5); }
    .tl-dot.yellow { background: #FFC200; box-shadow: 0 0 5px rgba(255,194,0,.55); }
    .tl-dot.green  { background: #00B800; box-shadow: 0 0 5px rgba(0,184,0,.5); }
    .status-label  { font-size: .68rem; font-weight: 700; white-space: nowrap; }
    .status-label.gray   { color: #888; }
    .status-label.red    { color: #C40000; }
    .status-label.yellow { color: #8A6500; }
    .status-label.green  { color: #006A00; }
    @keyframes blink-orange { 0%,100% { opacity:1; } 50% { opacity:.15; } }
    .tl-dot.orange { background: #FF8C00; box-shadow: 0 0 6px rgba(255,140,0,.65); animation: blink-orange .9s ease-in-out infinite; }
    .status-label.orange { color: #B85C00; }
    .cell-unset { border-color: #FF8C00 !important; background: #fffaf5 !important; box-shadow: 0 0 0 2px rgba(255,140,0,.18) !important; }
    .required-placeholder { display:block; color:#FF8C00; font-size:.82rem; font-weight:700; text-align:center; padding:5px 7px; cursor:pointer; }

    /* ── Buttons ── */
    .btn-del { background: none; border: none; color: #ccc; font-size: .95rem; cursor: pointer; padding: 4px 5px; border-radius: 6px; transition: color .2s, background .2s; }
    .btn-del:hover { color: #ff6b6b; background: #fff0f0; }
    .btn-ext {
      background: none; border: 1px solid #ffa502; color: #c07800;
      font-size: .7rem; font-weight: 600; cursor: pointer; padding: 4px 5px;
      border-radius: 5px; line-height: 1.35; white-space: nowrap; transition: all .18s;
    }
    .btn-ext:hover { background: #ffa502; color: #fff; }
    .btn-ext:disabled { border-color: #ddd; color: #ccc; cursor: not-allowed; background: none; }
    .btn-uncomplete {
      background: none; border: 1px solid #6c63ff; color: #5147d4;
      font-size: .7rem; font-weight: 600; cursor: pointer; padding: 4px 5px;
      border-radius: 5px; white-space: nowrap; transition: all .18s;
    }
    .btn-uncomplete:hover { background: #6c63ff; color: #fff; }
    .rating-selector { display:flex; flex-direction:column; gap:3px; margin-bottom:4px; align-items:center; }
    .rating-nav { display:flex; align-items:center; gap:2px; width:100%; }
    .btn-rate-nav { background:none; border:1px solid #ccc; border-radius:3px; padding:1px 4px; font-size:.68rem; cursor:pointer; color:#888; line-height:1.3; flex-shrink:0; transition:all .15s; }
    .btn-rate-nav:hover { border-color:#6c63ff; color:#6c63ff; background:#f4f3ff; }
    .rating-cur { flex:1; text-align:center; font-size:.7rem; font-weight:700; overflow:hidden; white-space:nowrap; }
    .rating-cur.good       { color:#2e7d32; }
    .rating-cur.poor       { color:#b36000; }
    .rating-cur.bad        { color:#c62828; }
    .rating-cur.unresolved { color:#6a1b9a; }
    .btn-rate-confirm { background:#6c63ff; color:#fff; border:none; border-radius:4px; padding:2px 10px; font-size:.68rem; font-weight:700; cursor:pointer; transition:all .15s; }
    .btn-rate-confirm:hover { background:#574fd6; }
    .rating-badge { display:block; text-align:center; border-radius:4px; padding:2px 4px; font-size:.7rem; font-weight:700; margin-bottom:4px; white-space:nowrap; }
    .rating-badge.good       { background:#2e7d32; color:#fff; }
    .rating-badge.poor       { background:#f57f17; color:#fff; }
    .rating-badge.bad        { background:#c62828; color:#fff; }
    .rating-badge.unresolved { background:#6a1b9a; color:#fff; }
    .btn-cancel-ext {
      background: none; border: 1px solid #9b59b6; color: #7d3c98;
      font-size: .7rem; font-weight: 600; cursor: pointer; padding: 4px 5px;
      border-radius: 5px; white-space: nowrap; transition: all .18s;
    }
    .btn-cancel-ext:hover { background: #9b59b6; color: #fff; }

    .empty { text-align: center; padding: 36px 0; color: #ccc; font-size: .9rem; }
    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

    /* ── 할일 등록 폼 ── */
    .register-section {
      flex-shrink: 0; background: #f4f3ff;
      border-top: 3px solid #6c63ff; margin: 0 -1.87rem;
      padding: 1.2rem 1.87rem 1.47rem; border-radius: 0 0 1rem 1rem;
    }
    .register-header { font-size: .95rem; font-weight: 700; color: #6c63ff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; justify-content: space-between; }
    .register-toggle { font-size: .75rem; font-weight: 400; color: #9b93ff; letter-spacing: 0; }
    .register-section.reg-collapsed { padding-top: 0.45rem; padding-bottom: 0.45rem; }
    .register-section.reg-collapsed .register-header { margin-bottom: 0; }
    .register-section.reg-collapsed .register-form,
    .register-section.reg-collapsed .register-hint { display: none; }
    .register-header::before { content: ''; display: inline-block; width: 4px; height: 16px; background: #6c63ff; border-radius: 2px; }
    .register-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: .75rem; font-weight: 600; color: #888; letter-spacing: .04em; }
    .form-group label .req { color: #ff6b6b; margin-left: 2px; }
    .form-control {
      border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 11px;
      font-size: .87rem; font-family: inherit; color: #333; outline: none;
      background: #fff; transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,.13); }
    .form-control.error { border-color: #ff6b6b; }
    .fg-category { width: 8.7rem; }
    .fg-task     { flex: 1; min-width: 13.3rem; }
    .fg-dept     { width: 8.7rem; }
    .fg-member   { width: 11.7rem; }
    .fg-duedate  { width: 9.9rem; }
    .btn-register {
      background: #6c63ff; color: #fff; border: none; border-radius: 8px;
      padding: 0 24px; font-size: .87rem; font-weight: 600; cursor: pointer;
      height: 2.5rem; transition: background .2s; white-space: nowrap;
    }
    .btn-register:hover { background: #574fd6; }
    .register-hint { margin-top: 8px; font-size: .8rem; color: #ff6b6b; min-height: 1.2em; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.48); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      background: #fff; border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.28);
      width: 34.7rem; max-width: 95vw; max-height: 82vh;
      overflow-y: auto; padding: 1.6rem;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 16px;
    }
    .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888; padding: 4px 8px; border-radius: 6px; line-height: 1; }
    .modal-close:hover { background: #f0f0f0; color: #333; }
    .dept-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .dept-tab { background: none; border: 1.5px solid #ccc; border-radius: 8px; padding: 6px 14px; font-size: .83rem; cursor: pointer; color: #666; transition: all .18s; }
    .dept-tab.active { background: #6c63ff; border-color: #6c63ff; color: #fff; font-weight: 600; }
    .dept-tab.add-tab { border-style: dashed; color: #6c63ff; border-color: #6c63ff; }
    .dept-tab.add-tab:hover { background: #f4f3ff; }

    .btn-export.dept-export { background: #e17055; }
    .btn-export.dept-export:hover { background: #c0392b; }
    .btn-export.dept-export:disabled { background: #bbb; cursor: not-allowed; opacity: .7; }
    .crossed { text-decoration: line-through; color: #aaa; }
    /* ── 과/담당자 불일치 에러 ── */
    .cell-mismatch { border-color: #ff6b6b !important; background: #fff0f0 !important; box-shadow: 0 0 0 2px rgba(255,107,107,.2) !important; }
    .mismatch-msg { display: block; color: #e74c3c; font-size: .68rem; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* ── 알림 ── */
    @keyframes slideInToast { from { transform: translateX(110%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes popIn { from { transform: scale(.8); opacity:0; } to { transform: scale(1); opacity:1; } }
    .alarm-notify-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:99999; display:flex; align-items:center; justify-content:center; }
    .alarm-notify-box { background:#fff; border-radius:1rem; padding:2rem 2.5rem; text-align:center; max-width:26rem; width:90vw; box-shadow:0 16px 48px rgba(0,0,0,.4); animation:popIn .3s ease; }
    .alarm-notify-icon { font-size:3rem; margin-bottom:.8rem; }
    .alarm-notify-title { font-size:1.3rem; font-weight:700; color:#1a1a2e; margin-bottom:.7rem; }
    .alarm-notify-msg { font-size:.9rem; color:#555; margin-bottom:1.5rem; line-height:1.6; }
    .alarm-notify-btn { background:#6c63ff; color:#fff; border:none; border-radius:.5rem; padding:.8rem 2rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .2s; }
    .alarm-notify-btn:hover { background:#574fd6; }
    .btn-alarm { background: none; border: 1.5px solid #ccc; border-radius: 8px; padding: 5px 12px; font-size: .82rem; color: #666; cursor: pointer; font-weight: 600; transition: all .18s; white-space: nowrap; }
    .btn-alarm:hover { border-color: #6c63ff; color: #6c63ff; background: #f4f3ff; }
    .btn-alarm.has-alarm { border-color: #6c63ff; background: #6c63ff; color: #fff; }
    .btn-alarm.has-alarm:hover { background: #574fd6; }
    .dept-name-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .dept-name-input { flex: 1; min-width: 120px; }
    .btn-modal-action { background: #6c63ff; color: #fff; border: none; border-radius: 7px; padding: 8px 14px; font-size: .84rem; cursor: pointer; white-space: nowrap; transition: background .18s; }
    .btn-modal-action:hover { background: #574fd6; }
    .btn-modal-danger { background: none; border: 1.5px solid #ff6b6b; color: #ff6b6b; border-radius: 7px; padding: 8px 14px; font-size: .84rem; cursor: pointer; white-space: nowrap; transition: all .18s; }
    .btn-modal-danger:hover { background: #ff6b6b; color: #fff; }
    .btn-modal-danger.sm { padding: 4px 10px; font-size: .78rem; }
    .member-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: .86rem; }
    .member-table th { background: #f5f5f5; padding: 7px 10px; text-align: left; font-size: .8rem; }
    .member-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; }
    .member-table .empty-row td { text-align: center; color: #bbb; padding: 14px; }
    .add-member-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .add-member-row .form-control { padding: 7px 10px; }
  </style>
</head>
<body>
<div class="app">
  <h1>할일 목록</h1>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="toolbar">
    <div class="filters" id="filters-bar"></div>
    <div class="right-tools">
      <span class="stats" id="stats-text"></span>
      <button class="btn-alarm" id="btn-alarm">⏰ 알림</button>
      <button class="btn-members" id="btn-members">과원 등록</button>
      <button class="btn-undo" id="btn-undo" disabled>
        ↩ 되돌리기 <span class="undo-count" id="undo-count">0</span>
      </button>
      <button class="clear-done" id="clear-done">완료 삭제</button>
    </div>
  </div>

  <div class="list-section">
    <div class="table-date-bar">
      <span class="table-date-text" id="date-label"></span>
      <div class="export-btns">
        <button id="btn-export-all" class="btn-export">엑셀 저장 (완료 포함)</button>
        <button id="btn-export-active" class="btn-export exclude">엑셀 저장 (완료 제외)</button>
        <button id="btn-export-dept" class="btn-export dept-export" disabled>과별 엑셀 저장</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th class="col-serial">일련번호</th>
            <th class="col-category">구분</th>
            <th class="col-task">할일</th>
            <th class="col-dept">과</th>
            <th class="col-member">담당자</th>
            <th class="col-duedate">목표일</th>
            <th class="col-completedate">완료일</th>
            <th class="col-status">진행현황</th>
            <th class="col-del"></th>
            <th class="col-ext">비고</th>
          </tr>
        </thead>
        <tbody id="todo-body"></tbody>
      </table>
      <div class="empty" id="empty-msg" style="display:none">
        <span>📋</span>할일이 없습니다. 하단 양식에서 등록하세요.
      </div>
    </div>
  </div>

  <!-- 할일 등록 폼 -->
  <div class="register-section">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    onSnapshot,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVvXZP9ZpLvI_uwXLkW6QDo-amwXDX4zU",
    authDomain: "mytodo-app-e3451.firebaseapp.com",
    projectId: "mytodo-app-e3451",
    storageBucket: "mytodo-app-e3451.firebasestorage.app",
    messagingSenderId: "918934658897",
    appId: "1:918934658897:web:c7b463ec379e2fd1927d70"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const db = getFirestore(appFirebase);
  const FIRESTORE_DOC_REF = doc(db, "todoApp", "mainState");

  const STORAGE_KEY = 'todo_sheet_v3';
  let todos = [];
  let dailyCounts = {};
  let departments = [];
  let members = [];
  let filter = 'all';
  let modalActiveDeptId = null;
  let deptFilter = '';
  let visibleTodos = [];

  const DEFAULT_DEPTS = ['성형기술1과', '성형기술2과', '성형기획과'];
  const CATEGORIES = ['경영층 지시', '센터장 지시', '실장 지시', '부서'];
  const RATINGS = ['Good', 'Poor', 'Bad', '미결 완료'];
  function ratingClass(r) {
    return { 'Good':'good', 'Poor':'poor', 'Bad':'bad', '미결 완료':'unresolved' }[r] || '';
  }

  /* ── ID 생성 ── */
  function genId() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  /* ── Undo (최대 3단계) ── */
  const MAX_HISTORY = 3;
  let undoStack = [];

  function pushHistory() {
    undoStack.push({
      todos: JSON.parse(JSON.stringify(todos)),
      dailyCounts: JSON.parse(JSON.stringify(dailyCounts)),
      departments: JSON.parse(JSON.stringify(departments)),
      members: JSON.parse(JSON.stringify(members))
    });
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    updateUndoBtn();
  }

  function undo() {
    if (!undoStack.length) return;
    const prev = undoStack.pop();
    todos = prev.todos;
    dailyCounts = prev.dailyCounts;
    departments = prev.departments || departments;
    members = prev.members || members;
    save(); render(); updateUndoBtn();
    populateRegDeptSelect();
  }

  function updateUndoBtn() {
    const btn = document.getElementById('btn-undo');
    const cnt = document.getElementById('undo-count');
    if (!btn) return;
    btn.disabled = undoStack.length === 0;
    cnt.textContent = undoStack.length;
  }

  /* ── Department helpers ── */
  function getDeptName(id) {
    const d = departments.find(d => d.id === id);
    return d ? d.name : '';
  }
  function getMemberDisplay(id) {
    const m = members.find(m => m.id === id);
    return m ? m.name + ' (' + m.position + ')' : '';
  }
  function getMembersOfDept(deptId) {
    return members.filter(m => m.deptId === deptId);
  }

  function addDept(name) {
    const trimmed = name.trim();
    if (!trimmed) return null;
    const dept = { id: genId(), name: trimmed };
    departments.push(dept);
    save(); return dept;
  }
  function renameDept(id, newName) {
    const d = departments.find(d => d.id === id);
    if (!d || !newName.trim()) return;
    d.name = newName.trim(); save();
  }
  function deleteDept(id) {
    const memberIds = new Set(members.filter(m => m.deptId === id).map(m => m.id));
    members = members.filter(m => m.deptId !== id);
    todos.forEach(t => {
      if (t.deptId === id) { t.deptId = ''; t.memberId = ''; }
      else if (memberIds.has(t.memberId)) { t.memberId = ''; }
    });
    departments = departments.filter(d => d.id !== id);
    save();
  }
  function addMember(deptId, name, position) {
    const trimmed = name.trim();
    if (!trimmed) return null;
    const m = { id: genId(), name: trimmed, deptId, position };
    members.push(m); save(); return m;
  }
  function deleteMember(id) {
    todos.forEach(t => { if (t.memberId === id) t.memberId = ''; });
    members = members.filter(m => m.id !== id); save();
  }

  /* ── Modal ── */
  function openModal() {
    if (!modalActiveDeptId && departments.length > 0) modalActiveDeptId = departments[0].id;
    renderModal();
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    populateDeptFilterBar(); populateRegDeptSelect(); render();
  }

  function updateDeptExportBtn() {
    const btn = document.getElementById('btn-export-dept');
    if (!btn) return;
    btn.disabled = !deptFilter;
    const dept = departments.find(d => d.id === deptFilter);
    btn.textContent = deptFilter ? (dept ? dept.name : '') + ' 엑셀 저장' : '과별 엑셀 저장';
  }

  function populateDeptFilterBar() {
    const bar = document.getElementById('filters-bar');
    if (!bar) return;
    bar.innerHTML = '';

    const defs = [
      { label: '전체',  f: 'all',    d: '' },
      { label: '미완료', f: 'active', d: '' },
      { label: '완료',  f: 'done',   d: '' },
    ];
    departments.forEach(dept => defs.push({ label: dept.name + ' 미완료', f: 'active', d: dept.id }));

    defs.forEach(({ label, f, d }) => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      const isActive = d ? deptFilter === d : (!deptFilter && filter === f);
      if (isActive) btn.classList.add('active');
      btn.textContent = label;
      btn.addEventListener('click', () => {
        filter = f; deptFilter = d;
        populateDeptFilterBar(); render();
      });
      bar.appendChild(btn);
    });
    updateDeptExportBtn();
  }

  function renderModal() {
    const panel = document.getElementById('modal-panel');
    panel.innerHTML = '';

    const hdr = document.createElement('div');
    hdr.className = 'modal-header';
    const hdrTitle = document.createElement('span'); hdrTitle.textContent = '과원 등록/관리';
    const btnClose = document.createElement('button');
    btnClose.className = 'modal-close'; btnClose.textContent = '✕';
    btnClose.addEventListener('click', closeModal);
    hdr.append(hdrTitle, btnClose);
    panel.appendChild(hdr);

    const tabBar = document.createElement('div');
    tabBar.className = 'dept-tabs';
    departments.forEach(dept => {
      const tab = document.createElement('button');
      tab.className = 'dept-tab' + (dept.id === modalActiveDeptId ? ' active' : '');
      tab.textContent = dept.name;
      tab.addEventListener('click', () => { modalActiveDeptId = dept.id; renderModal(); });
      tabBar.appendChild(tab);
    });
    const btnAddDept = document.createElement('button');
    btnAddDept.className = 'dept-tab add-tab'; btnAddDept.textContent = '+ 과 추가';
    btnAddDept.addEventListener('click', () => {
      const name = prompt('새 과 이름을 입력하세요:');
      if (name && name.trim()) {
        const d = addDept(name.trim());
        if (d) { modalActiveDeptId = d.id; renderModal(); }
      }
    });
    tabBar.appendChild(btnAddDept);
    panel.appendChild(tabBar);

    if (!modalActiveDeptId || !departments.find(d => d.id === modalActiveDeptId)) {
      if (departments.length > 0) { modalActiveDeptId = departments[0].id; }
      else {
        const msg = document.createElement('p');
        msg.style.cssText = 'text-align:center;color:#aaa;padding:24px 0';
        msg.textContent = '과를 먼저 추가하세요.';
        panel.appendChild(msg); return;
      }
    }

    const dept = departments.find(d => d.id === modalActiveDeptId);
    if (!dept) return;

    const nameRow = document.createElement('div');
    nameRow.className = 'dept-name-row';
    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.className = 'form-control dept-name-input';
    nameInput.value = dept.name; nameInput.placeholder = '과 이름';
    const btnRename = document.createElement('button');
    btnRename.className = 'btn-modal-action'; btnRename.textContent = '이름 변경';
    btnRename.addEventListener('click', () => {
      if (nameInput.value.trim()) { renameDept(dept.id, nameInput.value.trim()); renderModal(); }
    });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnRename.click(); });
    const btnDelDept = document.createElement('button');
    btnDelDept.className = 'btn-modal-danger'; btnDelDept.textContent = '과 삭제';
    btnDelDept.addEventListener('click', () => {
      const cnt = getMembersOfDept(dept.id).length;
      const msg = cnt > 0 ? `"${dept.name}" 과와 소속 과원 ${cnt}명을 모두 삭제하시겠습니까?`
                          : `"${dept.name}" 과를 삭제하시겠습니까?`;
      if (confirm(msg)) { deleteDept(dept.id); modalActiveDeptId = departments[0]?.id || null; renderModal(); }
    });
    nameRow.append(nameInput, btnRename, btnDelDept);
    panel.appendChild(nameRow);

    const mTable = document.createElement('table');
    mTable.className = 'member-table';
    const mHead = document.createElement('thead');
    mHead.innerHTML = '<tr><th>이름</th><th>직책</th><th style="width:56px"></th></tr>';
    mTable.appendChild(mHead);
    const mBody = document.createElement('tbody');
    const deptMembers = getMembersOfDept(dept.id);
    if (deptMembers.length === 0) {
      const tr = document.createElement('tr');
      tr.className = 'empty-row';
      tr.innerHTML = '<td colspan="3">등록된 과원이 없습니다</td>';
      mBody.appendChild(tr);
    } else {
      deptMembers.forEach(m => {
        const tr = document.createElement('tr');
        const tdName = document.createElement('td'); tdName.textContent = m.name;
        const tdPos  = document.createElement('td'); tdPos.textContent = m.position;
        const tdDel  = document.createElement('td');
        const btnDel = document.createElement('button');
        btnDel.className = 'btn-modal-danger sm'; btnDel.textContent = '삭제';
        btnDel.addEventListener('click', () => {
          if (confirm(`"${m.name}"을(를) 삭제하시겠습니까?`)) { deleteMember(m.id); renderModal(); }
        });
        tdDel.appendChild(btnDel);
        tr.append(tdName, tdPos, tdDel); mBody.appendChild(tr);
      });
    }
    mTable.appendChild(mBody); panel.appendChild(mTable);

    const addRow = document.createElement('div');
    addRow.className = 'add-member-row';
    const mNameInput = document.createElement('input');
    mNameInput.type = 'text'; mNameInput.className = 'form-control';
    mNameInput.placeholder = '과원 이름'; mNameInput.style.flex = '1'; mNameInput.style.minWidth = '100px';
    const mPosSelect = document.createElement('select');
    mPosSelect.className = 'form-control';
    ['과장', '책임', '매니저'].forEach(p => {
      const o = document.createElement('option'); o.value = p; o.textContent = p;
      mPosSelect.appendChild(o);
    });
    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn-modal-action'; btnAdd.textContent = '과원 추가';
    btnAdd.addEventListener('click', () => {
      if (mNameInput.value.trim()) {
        addMember(dept.id, mNameInput.value.trim(), mPosSelect.value);
        mNameInput.value = ''; renderModal();
      } else { mNameInput.focus(); }
    });
    mNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnAdd.click(); });
    addRow.append(mNameInput, mPosSelect, btnAdd); panel.appendChild(addRow);
  }

  /* ── 날짜 유틸 ── */
  function todayKey() {
    const d = new Date();
    return String(d.getFullYear()).slice(2)
      + String(d.getMonth()+1).padStart(2,'0')
      + String(d.getDate()).padStart(2,'0');
  }
  function todayISO() {
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  /* ── 일련번호 ── */
  function generateBaseSerial() {
    const key = todayKey();
    dailyCounts[key] = (dailyCounts[key] || 0) + 1;
    return key + String(dailyCounts[key]).padStart(2,'0');
  }

  /* ── 진행현황 ── */
  function computeStatus(todo) {
    if (todo.completeDateChanged) return { color:'gray', dot:false, text:'목표일 변경', big:true };
    if (!todo.completeDate && (!todo.deptId || !todo.dueDate)) {
      return { color:'orange', dot:true, text:'(지정 필요)' };
    }
    if (todo.completeDate) {
      if (!todo.dueDate) return { color:'green', dot:false, text:'완료(ok)' };
      const comp = new Date(todo.completeDate); comp.setHours(0,0,0,0);
      const due  = new Date(todo.dueDate);      due.setHours(0,0,0,0);
      const late = Math.round((comp - due) / 86400000);
      if (late <= 0) return { color:'green',  dot:false, text:'완료(ok)' };
      if (late <= 3) return { color:'yellow', dot:false, text:'완료(지연)' };
      return              { color:'red',    dot:false, text:'완료(늑장처리)' };
    }
    if (!todo.dueDate) return { color:'gray', dot:true, text:'' };
    const today = new Date(); today.setHours(0,0,0,0);
    const due   = new Date(todo.dueDate); due.setHours(0,0,0,0);
    const diff  = Math.round((due - today) / 86400000);
    if (diff > 3)  return { color:'green',  dot:true, text:'(진행)' };
    if (diff >= 0) return { color:'yellow', dot:true, text:'(임박)' };
    return               { color:'red',    dot:true, text:'(지연중)' };
  }

  /* ── Persistence: Firestore + local backup ── */
  function normalizeLoadedData(d) {
    todos = (d.todos || []).map(t => ({
      ...t,
      deptId:   t.deptId   !== undefined ? t.deptId   : '',
      memberId: t.memberId !== undefined ? t.memberId : '',
      rating:   t.rating   || ''
    }));
    dailyCounts = d.dailyCounts || {};
    departments = d.departments || [];
    members     = d.members     || [];
  }

  async function load() {
    return new Promise((resolve) => {
      let initialResolved = false;

      onSnapshot(FIRESTORE_DOC_REF, (snap) => {
        if (snap.metadata.hasPendingWrites) return;

        if (!initialResolved) {
          initialResolved = true;
          if (snap.exists()) {
            normalizeLoadedData(snap.data());
          } else {
            try {
              const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
              if (d) normalizeLoadedData(d);
            } catch(e) {}
          }
          if (departments.length === 0) {
            DEFAULT_DEPTS.forEach(name => departments.push({ id: genId(), name }));
            save().then(resolve);
          } else {
            resolve();
          }
        } else {
          if (snap.exists()) {
            normalizeLoadedData(snap.data());
            populateDeptFilterBar();
            populateRegDeptSelect();
            render();
          }
        }
      }, (error) => {
        console.warn('Firestore 실시간 연결 오류. localStorage 백업을 사용합니다.', error);
        if (!initialResolved) {
          initialResolved = true;
          try {
            const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (d) normalizeLoadedData(d);
          } catch(e) {}
          if (departments.length === 0) {
            DEFAULT_DEPTS.forEach(name => departments.push({ id: genId(), name }));
          }
          resolve();
        }
      });
    });
  }

  async function save() {
    const data = { todos, dailyCounts, departments, members };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    try {
      await setDoc(FIRESTORE_DOC_REF, {
        ...data,
        updatedAt: serverTimestamp()
      }, { merge: true });
    } catch(e) {
      console.error('Firestore 저장 실패. localStorage에는 백업되었습니다.', e);
    }
  }

  /* ── Data ── */
  function addTodo({ category, text, deptId, memberId, dueDate }) {
    pushHistory();
    todos.push({
      id: Date.now() + Math.random(),
      baseSerial: generateBaseSerial(),
      subSerial: 0,
      category, text, deptId: deptId||'', memberId: memberId||'', dueDate,
      completeDate: '', completeDateChanged: false, rating: ''
    });
    save(); render();
  }

  function deleteTodo(id) {
    pushHistory();
    todos = todos.filter(t => t.id !== id);
    save(); render();
  }

  function extendDueDate(id) {
    const idx = todos.findIndex(t => t.id === id);
    if (idx < 0) return;
    pushHistory();
    const orig = todos[idx];
    const maxSub = todos.filter(t => t.baseSerial === orig.baseSerial)
      .reduce((m, t) => Math.max(m, t.subSerial), orig.subSerial);
    orig.completeDate = todayISO();
    orig.completeDateChanged = true;
    todos.splice(idx + 1, 0, {
      id: Date.now() + Math.random(),
      baseSerial: orig.baseSerial,
      subSerial: maxSub + 1,
      category: orig.category, text: orig.text,
      deptId: orig.deptId, memberId: orig.memberId,
      dueDate: '', completeDate: '', completeDateChanged: false
    });
    save(); render();
  }

  /* 변경취소: completeDateChanged 행을 원래 상태로 복원하고 이후 파생 항목 삭제 */
  function cancelExtension(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo || !todo.completeDateChanged) return;
    pushHistory();
    todos = todos.filter(t => !(t.baseSerial === todo.baseSerial && t.subSerial > todo.subSerial));
    todo.completeDateChanged = false;
    todo.completeDate = '';
    save(); render();
  }

  /* 미완료 처리: 해당 그룹의 실완료 항목들의 완료일을 지워 활성으로 복귀 */
  function uncompleteTodo(baseSerial) {
    pushHistory();
    todos.forEach(t => {
      if (t.baseSerial === baseSerial) {
        if (t.completeDate && !t.completeDateChanged) t.completeDate = '';
        t.rating = '';
      }
    });
    save(); render();
  }

  function setRating(baseSerial, ratingValue) {
    const group = todos.filter(t => t.baseSerial === baseSerial)
      .sort((a, b) => a.subSerial - b.subSerial);
    if (!group.length || group[0].rating) return;
    pushHistory();
    group[0].rating = ratingValue;
    save(); render();
  }

  function updateField(id, field, value) {
    const t = todos.find(t => t.id === id);
    if (!t || t[field] === value) return;
    pushHistory();
    t[field] = value; save(); render();
  }

  function updateSerialDate(id, newYymmdd) {
    if (!/^\d{6}$/.test(newYymmdd)) return false;
    const t = todos.find(t => t.id === id);
    if (!t) return false;
    const oldBase = t.baseSerial;
    const xx = oldBase.slice(6);
    const newBase = newYymmdd + xx;
    if (newBase === oldBase) return true;
    pushHistory();
    todos.forEach(td => { if (td.baseSerial === oldBase) td.baseSerial = newBase; });
    save(); render();
    return true;
  }

  function clearDone() {
    pushHistory();
    todos = todos.filter(t => !(t.completeDate && !t.completeDateChanged));
    save(); render();
  }

  /* ── Render helpers ── */
  function makeInput(type, value, placeholder, extraClass, onchange) {
    const el = document.createElement('input');
    el.type = type; el.value = value;
    el.className = 'cell-input' + (extraClass ? ' '+extraClass : '');
    if (placeholder) el.placeholder = placeholder;
    el.addEventListener('change', onchange);
    return el;
  }

  function makeTaskTextarea(value, onchange) {
    const ta = document.createElement('textarea');
    ta.className = 'cell-textarea';
    ta.value = value;
    ta.rows = 1;
    function resize() {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }
    ta.addEventListener('input', resize);
    ta.addEventListener('change', onchange);
    setTimeout(resize, 0);
    return ta;
  }

  function makeReadonly(text, extraClass) {
    const span = document.createElement('span');
    span.className = 'cell-readonly' + (extraClass ? ' ' + extraClass : '');
    span.textContent = text || '';
    return span;
  }

  function makeCategorySelect(value, onchange) {
    const sel = document.createElement('select');
    sel.className = 'cell-input cell-select';
    [['', '구분 선택'], ...CATEGORIES.map(c => [c, c])].forEach(([v, t]) => {
      const o = document.createElement('option');
      o.value = v; o.textContent = t;
      if (v === value) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', onchange);
    return sel;
  }

  function makeDeptSelect(selectedDeptId) {
    const sel = document.createElement('select');
    sel.className = 'cell-input cell-select';
    if (!selectedDeptId) sel.classList.add('cell-unset');
    const blank = document.createElement('option');
    blank.value = ''; blank.textContent = selectedDeptId ? '-- 과 --' : '지정 필요';
    sel.appendChild(blank);
    departments.forEach(d => {
      const o = document.createElement('option');
      o.value = d.id; o.textContent = d.name;
      if (d.id === selectedDeptId) o.selected = true;
      sel.appendChild(o);
    });
    return sel;
  }

  function makeMemberSelect(deptId, selectedMemberId) {
    const sel = document.createElement('select');
    sel.className = 'cell-input cell-select';
    const blank = document.createElement('option');
    blank.value = ''; blank.textContent = '-- 담당자 --';
    sel.appendChild(blank);
    getMembersOfDept(deptId).forEach(m => {
      const o = document.createElement('option');
      o.value = m.id; o.textContent = m.name + ' (' + m.position + ')';
      if (m.id === selectedMemberId) o.selected = true;
      sel.appendChild(o);
    });

  }

  function makeStatusLight(st) {
    const wrap = document.createElement('div');
    wrap.className = 'traffic-light';
    if (st.dot) {
      const dot = document.createElement('span');
      dot.className = 'tl-dot ' + st.color;
      wrap.appendChild(dot);
    }
    if (st.text) {
      const lbl = document.createElement('span');
      lbl.className = 'status-label ' + st.color;
      if (st.big) lbl.style.fontSize = 'calc(.68rem + 2pt)';
      lbl.textContent = st.text;
      wrap.appendChild(lbl);
    }
    return wrap;
  }

  /* ── 셀렉트 글자 크기 자동 조정 ── */
  const _szCanvas = document.createElement('canvas');
  const _szCtx = _szCanvas.getContext('2d');

  function adjustSelectFontSizes() {
    const rootFs = parseFloat(getComputedStyle(document.documentElement).fontSize);
    const basePx = rootFs * 0.85; // 현재 뷰포트 기준 0.85rem 실제 px
    const minPx  = rootFs * 0.55; // 최소 0.55rem

    document.querySelectorAll('#todo-body .cell-select').forEach(sel => {
      const idx = sel.selectedIndex;
      const text = idx >= 0 ? (sel.options[idx]?.text || '') : '';
      if (!text || text.startsWith('--') || text === '구분 선택') {
        sel.style.fontSize = '';
        return;
      }
      const availWidth = sel.clientWidth - 28;
      _szCtx.font = `${basePx}px 'Segoe UI', sans-serif`;
      if (_szCtx.measureText(text).width <= availWidth) {
        sel.style.fontSize = ''; // 텍스트가 충분히 들어오면 CSS rem 값 복원
        return;
      }
      let fs = basePx;
      for (; fs >= minPx; fs -= 0.5) {
        _szCtx.font = `${fs}px 'Segoe UI', sans-serif`;
        if (_szCtx.measureText(text).width <= availWidth) break;
      }
      sel.style.fontSize = Math.max(minPx, fs).toFixed(1) + 'px';
    });
  }

  window.addEventListener('resize', () => requestAnimationFrame(adjustSelectFontSizes));

  /* ── 등록 폼 과/담당자 ── */

  /* ── Clock ── */
  function updateClock() {
    const now = new Date();
    const date = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    const time = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
    document.getElementById('date-label').textContent = date + '  ' + time;
  }
  updateClock();

  /* ── Main render ── */
  const tbody   = document.getElementById('todo-body');
  const emptyEl = document.getElementById('empty-msg');
  const statsEl = document.getElementById('stats-text');
  const fillEl  = document.getElementById('progress-fill');

  function render() {
    const completedBases = new Set(
      todos.filter(t => t.completeDate && !t.completeDateChanged).map(t => t.baseSerial)
    );
    const active    = todos.filter(t => !completedBases.has(t.baseSerial));
    const completed = todos
      .filter(t => completedBases.has(t.baseSerial))
      .sort((a, b) => a.baseSerial.localeCompare(b.baseSerial) || (a.subSerial - b.subSerial));

    // 미완료: 지연중(0)→임박(1)→진행(2)→기타(3) 순, 동순위는 일련번호 오름차순
    function activeStatusPriority(todo) {
      const st = computeStatus(todo);
      if (st.color === 'orange') return -1;
      if (st.color === 'red'    && st.dot) return 0;
      if (st.color === 'yellow' && st.dot) return 1;
      if (st.color === 'green'  && st.dot) return 2;
      return 3;
    }
    const activeGroupMap = {};
    active.forEach(t => {
      (activeGroupMap[t.baseSerial] = activeGroupMap[t.baseSerial] || []).push(t);
    });
    Object.values(activeGroupMap).forEach(g => g.sort((a, b) => a.subSerial - b.subSerial));
    const sortedActive = Object.entries(activeGroupMap)
      .sort(([keyA, grpA], [keyB, grpB]) => {
        const getCur = grp => grp.find(t => !t.completeDateChanged && !t.completeDate) || grp[grp.length - 1];
        const pa = activeStatusPriority(getCur(grpA));
        const pb = activeStatusPriority(getCur(grpB));
        if (pa !== pb) return pa - pb;
        return keyA.localeCompare(keyB);
      })
      .flatMap(([, g]) => g);
    const sorted = [...sortedActive, ...completed];

    const visible = sorted.filter(t => {
      const inDone = completedBases.has(t.baseSerial);
      if (deptFilter) return !inDone && t.deptId === deptFilter;
      if (filter === 'done')   return inDone;
      if (filter === 'active') return !inDone;
      return true;
    });
    visibleTodos = visible;

    /* 그룹별 보이는 행 수 (할일 셀 rowspan 계산) */
    const groupCount = {};
    visible.forEach(t => { groupCount[t.baseSerial] = (groupCount[t.baseSerial] || 0) + 1; });
    const groupSeen = new Set();

    tbody.innerHTML = '';
    let doneSectionStarted = false;

    visible.forEach(todo => {
      const status = computeStatus(todo);
      const inDone = completedBases.has(todo.baseSerial);
      const isFirst = !groupSeen.has(todo.baseSerial);
      if (isFirst) groupSeen.add(todo.baseSerial);
      const gSize = groupCount[todo.baseSerial];

      const tr = document.createElement('tr');
      if (inDone) {
        tr.classList.add('done-row');
        if (!doneSectionStarted && filter === 'all') {
          tr.classList.add('done-section-start');
          doneSectionStarted = true;
        }
      }
      if (todo.subSerial > 0) tr.classList.add('extended-row');

      /* ── 일련번호 ── */
      const tdSerial = document.createElement('td');
      tdSerial.className = 'col-serial';
      const serialWrap = document.createElement('span');
      serialWrap.className = 'serial-plain';
      if (todo.subSerial > 0) {
        const indentEl = document.createElement('span');
        indentEl.className = 'serial-indent';
        indentEl.textContent = '└';
        serialWrap.appendChild(indentEl);
      }
      if (inDone) {
        const textEl = document.createElement('span');
        textEl.textContent = todo.baseSerial + '-' + String(todo.subSerial).padStart(2,'0');
        serialWrap.appendChild(textEl);
      } else {
        const yyIn = document.createElement('input');
        yyIn.className = 'serial-yymmdd'; yyIn.maxLength = 6;
        yyIn.value = todo.baseSerial.slice(0, 6);
        yyIn.title = 'yymmdd 수정 (Enter/Tab 확인)';
        yyIn.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            const ok = updateSerialDate(todo.id, yyIn.value.trim());
            if (!ok) yyIn.value = todo.baseSerial.slice(0, 6);
          }
        });
        yyIn.addEventListener('blur', () => {
          const ok = updateSerialDate(todo.id, yyIn.value.trim());
          if (!ok) yyIn.value = todo.baseSerial.slice(0, 6);
        });
        const fx = document.createElement('span');
        fx.className = 'serial-fixed';
        fx.textContent = todo.baseSerial.slice(6) + '-' + String(todo.subSerial).padStart(2,'0');
        serialWrap.append(yyIn, fx);
      }
      tdSerial.appendChild(serialWrap);

      /* ── 구분 (그룹 첫 행만, rowspan 적용) ── */
      let tdCat = null;
      if (isFirst) {
        tdCat = document.createElement('td');
        tdCat.className = 'col-category';
        if (gSize > 1) tdCat.rowSpan = gSize;
        if (inDone) {
          tdCat.appendChild(makeReadonly(todo.category));
        } else {
          const bs = todo.baseSerial;
          tdCat.appendChild(makeCategorySelect(todo.category, () => {
            const newCat = tdCat.querySelector('select').value;
            const group = todos.filter(t => t.baseSerial === bs);
            if (!group.some(t => t.category !== newCat)) return;
            pushHistory();
            group.forEach(t => { t.category = newCat; });
            save(); render();
          }));
        }
      }

      /* ── 할일 (그룹 첫 행만, rowspan 적용) ── */
      let tdTask = null;
      if (isFirst) {
        tdTask = document.createElement('td');
        tdTask.className = 'col-task';
        if (gSize > 1) tdTask.rowSpan = gSize;
        if (inDone) {
          tdTask.appendChild(makeReadonly(todo.text));
        } else {
          const bs = todo.baseSerial;
          tdTask.appendChild(makeTaskTextarea(todo.text, () => {
            const newText = tdTask.querySelector('textarea').value;
            const group = todos.filter(t => t.baseSerial === bs);
            if (!group.some(t => t.text !== newText)) return;
            pushHistory();
            group.forEach(t => { t.text = newText; });
            save(); render();
          }));
        }
      }

      /* ── 과 ── */
      const tdDept = document.createElement('td');
      tdDept.className = 'col-dept';

      /* ── 담당자 ── */
      const tdMember = document.createElement('td');
      tdMember.className = 'col-member';

      if (inDone) {
        tdDept.appendChild(makeReadonly(getDeptName(todo.deptId)));
        tdMember.appendChild(makeReadonly(getMemberDisplay(todo.memberId)));
      } else if (todo.completeDateChanged) {
        const dR = makeReadonly(getDeptName(todo.deptId));
        const mR = makeReadonly(getMemberDisplay(todo.memberId));
        dR.classList.add('crossed'); mR.classList.add('crossed');
        tdDept.appendChild(dR); tdMember.appendChild(mR);
      } else {
        const deptSel = makeDeptSelect(todo.deptId);
        const memberSel = makeMemberSelect(todo.deptId, todo.memberId);

        // 과/담당자 불일치 검사
        if (todo.memberId) {
          const mm = members.find(m => m.id === todo.memberId);
          if (mm && mm.deptId !== todo.deptId) {
            const mDept = departments.find(d => d.id === mm.deptId);
            const errMsg = `⚠ "${mm.name}"은(는) "${mDept ? mDept.name : '다른 과'}" 소속입니다`;
            deptSel.classList.add('cell-mismatch'); deptSel.title = errMsg;
            memberSel.classList.add('cell-mismatch'); memberSel.title = errMsg;
            const errSpan = document.createElement('span');
            errSpan.className = 'mismatch-msg';
            errSpan.textContent = '⚠ ' + mm.name + (mDept ? ' (' + mDept.name + ')' : '');
            tdMember.appendChild(errSpan);
          }
        }

        deptSel.addEventListener('change', () => {
          const t = todos.find(x => x.id === todo.id);
          if (!t) return;
          pushHistory();
          t.deptId = deptSel.value; t.memberId = '';
          save(); render();
        });
        memberSel.addEventListener('change', () =>
          updateField(todo.id, 'memberId', memberSel.value));
        tdDept.appendChild(deptSel);
        tdMember.appendChild(memberSel);
      }

      /* ── 목표일 ── */
      const tdDue = document.createElement('td');
      tdDue.className = 'col-duedate';
      if (inDone) {
        tdDue.appendChild(makeReadonly(todo.dueDate || '', 'date-val'));
      } else if (todo.completeDateChanged) {
        const span = document.createElement('span');
        span.className = 'date-readonly crossed';
        span.textContent = todo.dueDate || '';
        tdDue.appendChild(span);
      } else if (!todo.dueDate) {
        const reqSpan = document.createElement('span');
        reqSpan.className = 'required-placeholder';
        reqSpan.textContent = '지정 필요';
        const dateIn = document.createElement('input');
        dateIn.type = 'date';
        dateIn.className = 'cell-input';
        dateIn.addEventListener('change', () => {
          if (dateIn.value) updateField(todo.id, 'dueDate', dateIn.value);
        });
        tdDue.append(reqSpan, dateIn);
      } else {
        tdDue.appendChild(makeInput('date', todo.dueDate, '', '',
          () => updateField(todo.id, 'dueDate', tdDue.querySelector('input').value)));
      }

      /* ── 완료일 ── */
      const tdComp = document.createElement('td');
      tdComp.className = 'col-completedate';
      if (todo.completeDateChanged) {
        const div = document.createElement('div');
        div.className = 'complete-changed';
        div.textContent = todo.completeDate + ' (변경일)';
        tdComp.appendChild(div);
      } else if (inDone) {
        tdComp.appendChild(makeReadonly(todo.completeDate || '', 'date-val'));
      } else {
        tdComp.appendChild(makeInput('date', todo.completeDate, '', '',
          () => updateField(todo.id, 'completeDate', tdComp.querySelector('input').value)));
      }

      /* ── 진행현황 ── */
      const tdSt = document.createElement('td');
      tdSt.className = 'col-status';
      tdSt.appendChild(makeStatusLight(status));

      /* ── 삭제 ── */
      const tdDel = document.createElement('td');
      tdDel.className = 'col-del';
      const btnDel = document.createElement('button');
      btnDel.className = 'btn-del'; btnDel.textContent = '✕'; btnDel.title = '삭제';
      btnDel.addEventListener('click', () => deleteTodo(todo.id));
      tdDel.appendChild(btnDel);

      /* ── 비고 ── */
      const tdExt = document.createElement('td');
      tdExt.className = 'col-ext';
      if (inDone) {
        if (isFirst) {
          const groupFirst = todos.filter(t => t.baseSerial === todo.baseSerial)
            .sort((a, b) => a.subSerial - b.subSerial)[0];
          const currentRating = groupFirst?.rating || '';
          if (currentRating) {
            const badge = document.createElement('span');
            badge.className = 'rating-badge ' + ratingClass(currentRating);
            badge.textContent = currentRating;
            tdExt.appendChild(badge);
          } else {
            let ridx = 0;
            const selDiv = document.createElement('div');
            selDiv.className = 'rating-selector';
            const navDiv = document.createElement('div');
            navDiv.className = 'rating-nav';
            const btnL = document.createElement('button');
            btnL.type = 'button'; btnL.className = 'btn-rate-nav'; btnL.textContent = '◀';
            const curSpan = document.createElement('span');
            const btnR = document.createElement('button');
            btnR.type = 'button'; btnR.className = 'btn-rate-nav'; btnR.textContent = '▶';
            function refreshCur() {
              const r = RATINGS[ridx];
              curSpan.className = 'rating-cur ' + ratingClass(r);
              curSpan.textContent = r;
            }
            refreshCur();
            btnL.addEventListener('click', () => { ridx = (ridx - 1 + RATINGS.length) % RATINGS.length; refreshCur(); });
            btnR.addEventListener('click', () => { ridx = (ridx + 1) % RATINGS.length; refreshCur(); });
            navDiv.append(btnL, curSpan, btnR);
            const btnOk = document.createElement('button');
            btnOk.type = 'button'; btnOk.className = 'btn-rate-confirm'; btnOk.textContent = '확정';
            btnOk.addEventListener('click', () => setRating(todo.baseSerial, RATINGS[ridx]));
            selDiv.append(navDiv, btnOk);
            tdExt.appendChild(selDiv);
          }
        }
        const btnUncomplete = document.createElement('button');
        btnUncomplete.className = 'btn-uncomplete';
        btnUncomplete.textContent = '미완료처리';
        btnUncomplete.title = '완료를 취소하고 할일 목록으로 이동합니다';
        btnUncomplete.addEventListener('click', () => uncompleteTodo(todo.baseSerial));
        tdExt.appendChild(btnUncomplete);
      } else if (todo.completeDateChanged) {
        const btnCancel = document.createElement('button');
        btnCancel.className = 'btn-cancel-ext';
        btnCancel.textContent = '변경취소';
        btnCancel.title = '목표일 변경을 취소하고 이후 파생 항목을 삭제합니다';
        btnCancel.addEventListener('click', () => cancelExtension(todo.id));
        tdExt.appendChild(btnCancel);
      } else {
        const btnExt = document.createElement('button');
        btnExt.className = 'btn-ext';
        btnExt.textContent = '목표일\n변경';
        btnExt.title = '완료일을 오늘로 확정하고 연장 행을 추가합니다';
        btnExt.disabled = !!todo.completeDate;
        btnExt.addEventListener('click', () => extendDueDate(todo.id));
        tdExt.appendChild(btnExt);
      }

      /* ── Tab 이동 (활성 행) ── */
      if (!inDone) {
        const tabCells = [...(tdCat ? [tdCat] : []), ...(tdTask ? [tdTask] : []), tdDept, tdMember, tdDue, tdComp];
        const tabEls = tabCells.map(td => td.querySelector('input,select,textarea')).filter(Boolean);
        tabEls.forEach((el, ci) => {
          el.addEventListener('keydown', e => {
            if (e.key === 'Tab') {
              e.preventDefault();
              tabEls[(ci + (e.shiftKey ? tabEls.length-1 : 1)) % tabEls.length].focus();
            }
          });
        });
      }

      /* ── 행 조립 ── */
      tr.appendChild(tdSerial);
      if (tdCat) tr.appendChild(tdCat);
      if (tdTask) tr.appendChild(tdTask);
      tr.appendChild(tdDept);
      tr.appendChild(tdMember);
      tr.appendChild(tdDue);
      tr.appendChild(tdComp);
      tr.appendChild(tdSt);
      tr.appendChild(tdDel);
      tr.appendChild(tdExt);
      tbody.appendChild(tr);
    });

    const total = todos.length;
    const done  = todos.filter(t => t.completeDate && !t.completeDateChanged).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    fillEl.style.width = pct + '%';
    statsEl.textContent = `전체 ${total}개 · 완료 ${done}개 (${pct}%)`;
    emptyEl.style.display = visible.length ? 'none' : 'block';
    requestAnimationFrame(adjustSelectFontSizes);
  }

  /* ── Excel 내보내기 ── */
  function escapeXml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportToExcel(includeCompleted) {
    const completedBases = new Set(
      todos.filter(t => t.completeDate && !t.completeDateChanged).map(t => t.baseSerial)
    );
    const active = todos.filter(t => !completedBases.has(t.baseSerial));
    const completedSorted = todos
      .filter(t => completedBases.has(t.baseSerial))
      .sort((a, b) => a.baseSerial.localeCompare(b.baseSerial) || (a.subSerial - b.subSerial));
    const rows = includeCompleted ? [...active, ...completedSorted] : active;

    const headers = ['일련번호', '구분', '할일', '과', '담당자', '목표일', '완료일', '진행현황'];

    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
      + '<?mso-application progid="Excel.Sheet"?>\n'
      + '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"'
      + ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'
      + '<Styles>'
      + '<Style ss:ID="h"><Alignment ss:Horizontal="Center"/>'
      + '<Interior ss:Color="#6C63FF" ss:Pattern="Solid"/>'
      + '<Font ss:Color="#FFFFFF" ss:Bold="1"/></Style>'
      + '<Style ss:ID="done"><Interior ss:Color="#EAF7EA" ss:Pattern="Solid"/></Style>'
      + '</Styles>\n'
      + '<Worksheet ss:Name="할일목록"><Table>\n';

    xml += '<Row ss:Height="20">';
    headers.forEach(h => {
      xml += `<Cell ss:StyleID="h"><Data ss:Type="String">${escapeXml(h)}</Data></Cell>`;
    });
    xml += '</Row>\n';

    rows.forEach(t => {
      const inDone = completedBases.has(t.baseSerial);
      const st = computeStatus(t);
      const serial = t.baseSerial + '-' + String(t.subSerial).padStart(2,'0');
      const completeVal = t.completeDateChanged
        ? (t.completeDate + ' (변경일)') : (t.completeDate || '');
      const cells = [serial, t.category||'', t.text||'',
        getDeptName(t.deptId), getMemberDisplay(t.memberId),
        t.dueDate||'', completeVal, st.text||''];
      const sid = inDone ? ' ss:StyleID="done"' : '';
      xml += '<Row>';
      cells.forEach(v => {
        xml += `<Cell${sid}><Data ss:Type="String">${escapeXml(v)}</Data></Cell>`;
      });
      xml += '</Row>\n';
    });

    xml += '</Table></Worksheet></Workbook>';

    const blob = new Blob(['﻿' + xml], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    const ts = String(d.getFullYear()).slice(2)
      + String(d.getMonth()+1).padStart(2,'0')
      + String(d.getDate()).padStart(2,'0')
      + String(d.getHours()).padStart(2,'0')
      + String(d.getMinutes()).padStart(2,'0');
    a.download = `할일목록_${includeCompleted ? '전체' : '미완료'}_${ts}.xls`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  document.getElementById('btn-export-all').addEventListener('click', () => exportToExcel(true));
  document.getElementById('btn-export-active').addEventListener('click', () => exportToExcel(false));

  function exportDeptExcel() {
    if (!deptFilter || !visibleTodos.length) return;
    const dept = departments.find(d => d.id === deptFilter);
    const deptName = dept ? dept.name : '';
    const headers = ['일련번호', '구분', '할일', '과', '담당자', '목표일', '완료일', '진행현황'];
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
      + '<?mso-application progid="Excel.Sheet"?>\n'
      + '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"'
      + ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'
      + '<Styles>'
      + '<Style ss:ID="h"><Alignment ss:Horizontal="Center"/>'
      + '<Interior ss:Color="#E17055" ss:Pattern="Solid"/>'
      + '<Font ss:Color="#FFFFFF" ss:Bold="1"/></Style>'
      + '</Styles>\n'
      + '<Worksheet ss:Name="' + escapeXml(deptName) + '_미완료"><Table>\n';
    xml += '<Row ss:Height="20">';
    headers.forEach(h => {
      xml += `<Cell ss:StyleID="h"><Data ss:Type="String">${escapeXml(h)}</Data></Cell>`;
    });
    xml += '</Row>\n';
    visibleTodos.forEach(t => {
      const st = computeStatus(t);
      const serial = t.baseSerial + '-' + String(t.subSerial).padStart(2,'0');
      const completeVal = t.completeDateChanged ? (t.completeDate + ' (변경일)') : (t.completeDate || '');
      const cells = [serial, t.category||'', t.text||'',
        getDeptName(t.deptId), getMemberDisplay(t.memberId),
        t.dueDate||'', completeVal, st.text||''];
      xml += '<Row>';
      cells.forEach(v => { xml += `<Cell><Data ss:Type="String">${escapeXml(v)}</Data></Cell>`; });
      xml += '</Row>\n';
    });
    xml += '</Table></Worksheet></Workbook>';
    const blob = new Blob(['﻿' + xml], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    const ts = String(d.getFullYear()).slice(2)
      + String(d.getMonth()+1).padStart(2,'0')
      + String(d.getDate()).padStart(2,'0')
      + String(d.getHours()).padStart(2,'0')
      + String(d.getMinutes()).padStart(2,'0');
    a.download = `${deptName}_미완료_${ts}.xls`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
  document.getElementById('btn-export-dept').addEventListener('click', exportDeptExcel);

  document.getElementById('btn-members').addEventListener('click', openModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('clear-done').addEventListener('click', clearDone);
  document.getElementById('btn-undo').addEventListener('click', undo);

  /* ── 자동 알림 ── */
  const ALARM_KEY = 'todo_alarms_v1';
  let alarmSettings = { alarms: [{ enabled: false, time: '09:00' }, { enabled: false, time: '17:30' }] };
  let alarmsFiredToday = {};

  function loadAlarmSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(ALARM_KEY) || 'null');
      if (s && Array.isArray(s.alarms)) alarmSettings = s;
    } catch(e) {}
    updateAlarmBtn();
  }

  function saveAlarmSettings() {
    localStorage.setItem(ALARM_KEY, JSON.stringify(alarmSettings));
    updateAlarmBtn();
  }

  function updateAlarmBtn() {
    const btn = document.getElementById('btn-alarm');
    if (!btn) return;
    const anyOn = alarmSettings.alarms.some(a => a.enabled);
    btn.classList.toggle('has-alarm', anyOn);
    btn.title = anyOn
      ? '알림 설정됨: ' + alarmSettings.alarms.filter(a => a.enabled).map(a => a.time).join(', ')
      : '알림 설정 없음';
  }

  async function requestNotificationPermission() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') return false;
    const r = await Notification.requestPermission();
    return r === 'granted';
  }

  function playAlarmSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.35, 0.7].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.6);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.6);
      });
    } catch(e) {}
  }

  function showAlarmToast(message) {
    const old = document.getElementById('alarm-notify-overlay');
    if (old) old.remove();
    const overlay = document.createElement('div');
    overlay.id = 'alarm-notify-overlay';
    overlay.className = 'alarm-notify-overlay';
    const box = document.createElement('div');
    box.className = 'alarm-notify-box';
    box.innerHTML =
      '<div class="alarm-notify-icon">📋</div>' +
      '<div class="alarm-notify-title">할일 목록 알림</div>' +
      '<div class="alarm-notify-msg">' + message + '</div>' +
      '<button class="alarm-notify-btn" id="alarm-notify-close">확인</button>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    document.getElementById('alarm-notify-close').addEventListener('click', () => overlay.remove());

    // 탭 타이틀 점멸
    let flash = false;
    const orig = document.title;
    const ti = setInterval(() => { document.title = flash ? '📋 할일 알림!' : orig; flash = !flash; }, 800);
    setTimeout(() => { clearInterval(ti); document.title = orig; if (overlay.parentElement) overlay.remove(); }, 60000);
  }

  function checkAlarms(catchUp = 0) {
    for (let offset = 0; offset <= catchUp; offset++) {
      const t = new Date(Date.now() - offset * 60000);
      const hhmm = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
      const dateKey = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
      alarmSettings.alarms.forEach((alarm, idx) => {
        if (!alarm.enabled || alarm.time !== hhmm) return;
        const key = idx + '_' + dateKey;
        if (alarmsFiredToday[key]) return;
        alarmsFiredToday[key] = true;
        fireAlarm();
      });
    }
  }

  function fireAlarm() {
    const cBases = new Set(todos.filter(t => t.completeDate && !t.completeDateChanged).map(t => t.baseSerial));
    const active = todos.filter(t => !cBases.has(t.baseSerial));
    const delayed = active.filter(t => { const s = computeStatus(t); return s.color === 'red' && s.dot; });
    const msg = delayed.length > 0
      ? `미완료 ${active.length}개 · 지연중 ${delayed.length}개 있습니다.`
      : `미완료 할일이 ${active.length}개 있습니다.`;
    playAlarmSound();
    showAlarmToast(msg);
  }

  /* 알림 모달 */
  function generateSchedulerScript() {
    // 현재 파일의 Windows 경로 추출
    let winPath = decodeURIComponent(location.pathname);
    if (/^\/[A-Za-z]:/.test(winPath)) winPath = winPath.slice(1);
    winPath = winPath.replace(/\//g, '\\');

    let taskBlocks = '';
    alarmSettings.alarms.forEach((a, i) => {
      const num = i + 1;
      if (a.enabled) {
        taskBlocks +=
          '\r\n# 알람 ' + num + ': ' + a.time + '\r\n' +
          '$arg' + num + ' = "`"$htmlFile`""\r\n' +
          '$act' + num + ' = New-ScheduledTaskAction -Execute $browser -Argument $arg' + num + '\r\n' +
          '$trg' + num + ' = New-ScheduledTaskTrigger -Daily -At \'' + a.time + '\'\r\n' +
          'Register-ScheduledTask -TaskName \'할일목록_자동열기_' + num + '\' -Action $act' + num + ' -Trigger $trg' + num + ' -Force | Out-Null\r\n' +
          'Write-Host "  ✔ 알람 ' + num + ' (' + a.time + ') 등록 완료" -ForegroundColor Cyan\r\n';
      } else {
        taskBlocks += '\r\n# 알람 ' + num + ': 비활성화 (해당 작업 삭제)\r\n';
      }
    });

    return (
      '# ================================================\r\n' +
      '# 할일목록 자동 열기 - Windows 작업 스케줄러 설정\r\n' +
      '# 파일을 우클릭 -> "PowerShell로 실행" 하세요\r\n' +
      '# ================================================\r\n' +
      'Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force\r\n' +
      '\r\n' +
      '$htmlFile = "' + winPath + '"\r\n' +
      '\r\n' +
      '# 브라우저 자동 탐색 (Chrome -> Edge 순)\r\n' +
      '$browser = $null\r\n' +
      'foreach ($c in @(\r\n' +
      '    "$env:LOCALAPPDATA\\Google\\Chrome\\Application\\chrome.exe",\r\n' +
      '    "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe",\r\n' +
      '    "$env:LOCALAPPDATA\\Microsoft\\Edge\\Application\\msedge.exe",\r\n' +
      '    "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"\r\n' +
      ')) { if (Test-Path $c) { $browser = $c; break } }\r\n' +
      'if (-not $browser) { $browser = "msedge.exe" }\r\n' +
      'Write-Host "브라우저: $browser"\r\n' +
      '\r\n' +
      '# 기존 예약 작업 삭제\r\n' +
      'foreach ($n in @("할일목록_자동열기_1","할일목록_자동열기_2")) {\r\n' +
      '    Unregister-ScheduledTask -TaskName $n -Confirm:$false -ErrorAction SilentlyContinue\r\n' +
      '}\r\n' +
      taskBlocks +
      '\r\n' +
      'Write-Host ""\r\n' +
      'Write-Host "완료! 작업 스케줄러에서 확인: 시작 -> 작업 스케줄러 -> 할일목록_자동열기_*" -ForegroundColor Green\r\n' +
      'pause\r\n'
    );
  }

  function downloadSchedulerScript() {
    const content = generateSchedulerScript();
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '할일목록_자동열기_설정.ps1';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function openAlarmModal() { renderAlarmModal(); document.getElementById('alarm-modal-overlay').classList.add('open'); }
  function closeAlarmModal() { document.getElementById('alarm-modal-overlay').classList.remove('open'); }

  function renderAlarmModal() {
    const panel = document.getElementById('alarm-modal-panel');
    panel.innerHTML = '';

    const hdr = document.createElement('div'); hdr.className = 'modal-header';
    const hdrT = document.createElement('span'); hdrT.textContent = '⏰ 자동 알림 설정';
    const btnX = document.createElement('button'); btnX.className = 'modal-close'; btnX.textContent = '✕';
    btnX.addEventListener('click', closeAlarmModal);
    hdr.append(hdrT, btnX); panel.appendChild(hdr);

    const desc = document.createElement('p');
    desc.style.cssText = 'font-size:.81rem;color:#888;margin-bottom:16px;line-height:1.6';
    desc.textContent = '브라우저 탭이 열려 있는 동안 지정 시간에 알림을 표시합니다. 최대 하루 2회까지 설정할 수 있습니다.';
    panel.appendChild(desc);

    alarmSettings.alarms.forEach((alarm, idx) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:12px 16px;background:#f8f7ff;border-radius:10px;border:1.5px solid #e0e0e0';
      const chk = document.createElement('input');
      chk.type = 'checkbox'; chk.id = 'ac' + idx; chk.checked = alarm.enabled;
      chk.style.cssText = 'width:18px;height:18px;cursor:pointer;accent-color:#6c63ff;flex-shrink:0';
      const lbl = document.createElement('label'); lbl.htmlFor = 'ac' + idx;
      lbl.textContent = '알림 ' + (idx + 1);
      lbl.style.cssText = 'font-size:.88rem;font-weight:700;color:#444;cursor:pointer;white-space:nowrap;flex:1';
      const tim = document.createElement('input');
      tim.type = 'time'; tim.value = alarm.time; tim.className = 'form-control';
      tim.style.cssText = 'width:145px;font-size:.9rem;padding:6px 10px;';
      tim.disabled = !alarm.enabled;
      chk.addEventListener('change', () => { alarmSettings.alarms[idx].enabled = chk.checked; tim.disabled = !chk.checked; });
      tim.addEventListener('change', () => { alarmSettings.alarms[idx].time = tim.value; });
      row.append(chk, lbl, tim); panel.appendChild(row);
    });

    const permRow = document.createElement('div');
    permRow.style.cssText = 'display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;padding:10px 14px;border-radius:8px;font-size:.81rem;line-height:1.55;';
    if (location.protocol === 'file:') {
      permRow.style.background = '#fff8e1';
      permRow.style.border = '1.5px solid #ffe082';
      permRow.innerHTML = '<span style="font-size:1.1rem">⚠️</span><span style="color:#7a5800">로컬 파일은 브라우저 알림을 지원하지 않습니다. 탭이 열려 있을 때 <b>화면 중앙 팝업 + 소리</b>로 알립니다.</span>';
    } else {
      permRow.style.background = '#fff';
      permRow.style.border = '1.5px solid #e8e8e8';
      const permTxt = document.createElement('span'); permTxt.style.cssText = 'color:#555;flex:1';
      const refreshPerm = () => {
        if (!('Notification' in window)) permTxt.textContent = '❌ 이 브라우저는 알림을 지원하지 않습니다';
        else if (Notification.permission === 'granted') permTxt.textContent = '✅ 브라우저 알림 허용됨';
        else if (Notification.permission === 'denied') permTxt.textContent = '🚫 알림 차단됨 — 주소창 옆 아이콘에서 허용하세요';
        else permTxt.textContent = '❓ 알림 권한이 필요합니다';
      };
      refreshPerm(); permRow.appendChild(permTxt);
      if ('Notification' in window && Notification.permission === 'default') {
        const btnP = document.createElement('button'); btnP.className = 'btn-modal-action';
        btnP.textContent = '알림 허용'; btnP.style.fontSize = '.8rem';
        btnP.addEventListener('click', async () => { await requestNotificationPermission(); refreshPerm(); btnP.remove(); });
        permRow.appendChild(btnP);
      }
    }
    panel.appendChild(permRow);

    // Windows 자동 시작 설정 섹션
    const schedSection = document.createElement('div');
    schedSection.style.cssText = 'margin-top:1rem;padding:0.85rem 1rem;background:#f0f4ff;border:1px solid #c5d0f5;border-radius:0.6rem;';
    const schedTitle = document.createElement('div');
    schedTitle.style.cssText = 'font-weight:600;font-size:0.82rem;color:#3a3a6e;margin-bottom:0.4rem;';
    schedTitle.textContent = '🖥 Windows 자동 시작 설정';
    const schedDesc = document.createElement('div');
    schedDesc.style.cssText = 'font-size:0.73rem;color:#555;margin-bottom:0.6rem;line-height:1.5;';
    schedDesc.innerHTML =
      '아래 버튼으로 <b>PowerShell 스크립트(.ps1)</b>를 내려받고,<br>' +
      '파일을 우클릭 → <b>"PowerShell로 실행"</b> 하면<br>' +
      'Windows 작업 스케줄러에 자동 등록됩니다.<br>' +
      '<span style="color:#888;">(위에서 알람 시간을 먼저 저장한 뒤 내려받으세요.)</span>';
    const btnSched = document.createElement('button');
    btnSched.className = 'btn-modal-action';
    btnSched.style.cssText = 'background:#3d5af1;font-size:0.78rem;padding:0.38rem 0.9rem;';
    btnSched.textContent = '📥 자동 시작 스크립트 내려받기';
    btnSched.addEventListener('click', () => { saveAlarmSettings(); downloadSchedulerScript(); });
    schedSection.append(schedTitle, schedDesc, btnSched);
    panel.appendChild(schedSection);

    const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-top:0.8rem;';
    const btnSave = document.createElement('button'); btnSave.className = 'btn-modal-action'; btnSave.textContent = '저장';
    btnSave.addEventListener('click', () => { saveAlarmSettings(); closeAlarmModal(); });
    const btnCnl = document.createElement('button'); btnCnl.className = 'btn-modal-danger'; btnCnl.textContent = '닫기';
    btnCnl.addEventListener('click', closeAlarmModal);
    btnRow.append(btnSave, btnCnl); panel.appendChild(btnRow);
  }

  document.getElementById('btn-alarm').addEventListener('click', openAlarmModal);
  document.getElementById('alarm-modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('alarm-modal-overlay')) closeAlarmModal();
  });

  /* ── 등록 영역 접기/펼치기 ── */
  const regSection = document.querySelector('.register-section');
  const regHeader  = document.querySelector('.register-header');
  const regToggle  = document.createElement('span');
  regToggle.className = 'register-toggle';
  regHeader.appendChild(regToggle);

  function setRegCollapsed(v) {
    regSection.classList.toggle('reg-collapsed', v);
    regToggle.textContent = v ? '▼ 펼치기' : '▲ 접기';
  }
  regHeader.addEventListener('click', () =>
    setRegCollapsed(!regSection.classList.contains('reg-collapsed')));
  setRegCollapsed(true);

  async function initApp() {
    await load();
    loadAlarmSettings();
    populateDeptFilterBar();
    populateRegDeptSelect();
    render();
    checkAlarms(0);
    setInterval(() => checkAlarms(0), 10000); // 10초마다 확인 (백그라운드 스로틀 대비)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) checkAlarms(5); // 탭 활성화 시 최대 5분 이내 누락 알람 재확인
    });
  }

  initApp();
</script>
